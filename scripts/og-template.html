<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0B0E14;
    overflow: hidden;
    position: relative;
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .glow-1 {
    position: absolute;
    top: -50px;
    right: 200px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(239,68,68,0.06) 0%, transparent 70%);
  }
  .glow-2 {
    position: absolute;
    bottom: -100px;
    left: 100px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 70%);
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    height: 100%;
    padding: 0;
  }
  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 0 60px 70px;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .badge .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #EF4444;
    box-shadow: 0 0 12px rgba(239,68,68,0.6);
  }
  .badge span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #6B7A90;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
  }
  h1 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 64px;
    font-weight: 400;
    color: #E8ECF4;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 20px;
    font-style: italic;
  }
  p {
    font-family: 'DM Sans', sans-serif;
    font-size: 19px;
    color: #6B7A90;
    line-height: 1.55;
    max-width: 380px;
  }
  .url {
    margin-top: 36px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #3D4B5F;
    letter-spacing: 0.02em;
  }
  /* Phone mockup */
  .right {
    width: 440px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-right: 40px;
  }
  .phone {
    width: 280px;
    height: 560px;
    border-radius: 36px;
    border: 3px solid rgba(255,255,255,0.08);
    overflow: hidden;
    box-shadow:
      0 30px 60px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,255,255,0.03),
      0 0 80px rgba(59,130,246,0.04);
    position: relative;
    background: #0B0E14;
  }
  .phone .notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 22px;
    background: #000;
    border-radius: 0 0 14px 14px;
    z-index: 2;
  }
  .phone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="content">
    <div class="left">
      <div class="badge">
        <div class="dot"></div>
        <span>Real-time Alert Intelligence</span>
      </div>
      <h1>SirenWise</h1>
      <p>Interactive missile alert map with analytics, historical patterns, and regional insights for Israel.</p>
      <div class="url">sirenwise.com</div>
    </div>
    <div class="right">
      <div class="phone">
        <div class="notch"></div>
        <img src="/public/app-screenshot.png" alt="SirenWise App">
      </div>
    </div>
  </div>
</body>
</html>
